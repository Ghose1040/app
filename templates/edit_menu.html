<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Menu Item</title>
    <link rel="stylesheet" href="static/edit_menu.css">
</head>
<body>
    <nav class="nav">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            <h1>Jobillee</h1>
        </div>
        <ul>
            <li><a href="{{ url_for('admin') }}">Home</a></li>
            <li><a href="{{ url_for('orders') }}">Orders</a></li>
            <li><a href="{{ url_for('accounts') }}">Accounts</a></li>
            <li><a href="{{ url_for('edit_menu') }}">Add Menu</a></li>
            <li><a href="{{ url_for('admin_menu') }}">Update Menu</a></li>
            <li><a href="{{ url_for('admin_contact') }}">Contacts</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <h2>Add Menu Item</h2>
        <div class="edit">
            <form action="/edit_menu" method="POST" enctype="multipart/form-data">
                <label for="name">Menu Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="price">Price:</label>
                <input type="number" step="0.01" id="price" name="price" required>

                <label for="img">Image: </label>
                <input type="file" name="img" accept="image/*" required>

                <label for="category">Category:</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>Select a category</option>
                    <option value="Burgers">Burgers</option>
                    <option value="Meal">Meal</option>
                    <option value="Snacks">Snacks</option>
                    <option value="Drinks N Desserts">Drinks N Desserts</option>
                </select>

                <label for="category2">Category 2:</label>
                <select id="category2" name="category2">
                    <option value="" disabled selected>Select a category</option>
                    <option value="Best Sellers">Best Sellers</option>
                    <option value="New Products">New Products</option>
                    <option value="Filipino Foods">Filipino Foods</option>
                </select>

                <button type="submit">Add Menu Item</button>
            </form>
        </div>
    </div>
</body>
</html>
