<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <link rel="stylesheet" href="static/confirmation.css">
</head>
<body>
    <div class="container">
        <h2>Order Confirmation</h2>

        <form action="{{ url_for('confirm_order') }}" method="POST">
            {% for item in items_for_order %}
            <div class="order-item">
                <img src="{{ item.item_img }}" alt="{{ item.item_name }}" class="item-img"><br>
                <p><strong>Item:</strong> {{ item.item_name }}</p>
                <p><strong>Quantity:</strong> {{ item.quantity }}</p>
                <p><strong>Price per Item:</strong> ₱{{ item.item_price }}</p>
                <p><strong>Total:</strong> ₱{{ item.total_price }}</p>

                <input type="hidden" name="item_id" value="{{ item.item_id }}">
                <input type="hidden" name="item_img" value="{{ item.item_img }}">
                <input type="hidden" name="item_name" value="{{ item.item_name }}">
                <input type="hidden" name="item_quantity" value="{{ item.quantity }}">
                <input type="hidden" name="item_price" value="{{ item.item_price }}">
                <input type="hidden" name="item_total_price" value="{{ item.total_price }}">
            </div>
            {% endfor %}

            <p class="total-price">Total Order Amount: <strong>₱{{ total_order_price }}</strong></p>

            <div class="form-group">
                <label for="user_name">Name:</label>
                <input type="text" name="user_name" value="{{ user_info[0] }} {{ user_info[1] }}" required>
            </div>

            <div class="form-group">
                <label for="address">Address:</label>
                <input type="text" name="address" value="{{ user_info[2] }}" required>
            </div>

            <div class="form-group">
                <label for="number">Contact Number:</label>
                <input type="text" name="number" value="{{ user_info[3] }}" required>
            </div>

            <div class="form-group">
                <label for="payment_method">Payment Method:</label>
                <select name="payment_method" required>
                    <option value="COD">COD (Cash on Delivery)</option>
                </select>
            </div>
            <br><br>
            <button type="submit" class="confirm-btn">Confirm Order</button>
        </form>
    </div>
</body>
</html>
