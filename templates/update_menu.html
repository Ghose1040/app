<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Menu</title>
    <link rel="stylesheet" href="static/update_menu.css"> 
</head>
<body>

    <nav class="nav">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            <h1>Jobillee</h1>
        </div>
        <ul>
            <li><a href="{{ url_for('admin') }}">Home</a></li>
            <li><a href="{{ url_for('orders') }}">Orders</a></li>
            <li><a href="{{ url_for('accounts') }}">Accounts</a></li>
            <li><a href="{{ url_for('edit_menu') }}">Add Menu</a></li>
            <li><a href="{{ url_for('admin_menu') }}"> Update Menu</a></li>
            <li><a href="{{ url_for('admin_contact') }}">Contacts</a></li>
        </ul>
    </nav>

    <div class="edit-container">
        <h2>Update Menu Item</h2>
        <form action="/update_process" method="POST" enctype="multipart/form-data" class="edit-form">
            <label for="id">Id:</label>
            <input type="text" name="id" value="{{id}}">

            <label for="name">Name:</label>
            <input type="text" name="name" value="{{name}}">

            <label for="price">Price:</label>
            <input type="text"  name="price" value="{{price}}" required>

            <label for="img">Image:</label>
            <input type="file" name="img" accept="image/*">

            <button type="submit">Update Menu</button>
        </form>
    </div>
        
</body>
</html>
