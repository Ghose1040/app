<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place the Order</title>
    <link rel="stylesheet" href="static/place_the_order.css">
</head>
<body>

    <div class="customer-info-section">
        <h2>Order Summary</h2>
        <div class="order-item">
            <form action="{{ url_for('place_order') }}" method="POST">
                <img src="{{ item_img }}" width="100" height="100" alt="{{ item_name }}"><br>
                <input type="hidden" id="item_img" name="item_img" value="{{ item_img }}">
        
                <label for="item_name">Item Name:</label>
                <input type="text" id="item_name" name="item_name" value="{{ item_name }}" readonly><br>
        
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" name="quantity" value="{{ quantity }}"><br>
        
                <label for="item_price">Item Price (per item):</label>
                <input type="number" id="item_price" name="item_price" value="{{ item_price }}" readonly><br>
        
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" value="{{ user_info[0] }} {{ user_info[1] }}" readonly><br>
        
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" value="{{ user_info[2] }}" readonly><br>
        
                <label for="number">Contact Number:</label>
                <input type="text" id="number" name="number" value="{{ user_info[3] }}" readonly><br>
        
                <h3>Payment Method</h3>
                <label for="payment-method">Choose a payment method:</label><br>
                <select id="payment-method" name="payment_method" required>
                    <option value="COD">COD (Cash on Delivery)</option>
                </select><br><br><br>
                <button type="submit">Place Order</button>
            </form>
        </div>
        
</body>
</html>
